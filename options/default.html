<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">

		<link rel="stylesheet" href="../lib/codemirror.css"/>
		<link rel="stylesheet" href="../lib/codemirror/theme/darcula.css"/>
		<link rel="stylesheet" href="default.css"/>
	</head>

	<body>
		<div id="browser-options" class="container">
			<div class="panel titlebar">
				<img class="logo" src="logo.png" alt="Logo" />
				<h1>ModWe</h1>

				<div class="controls">
					<button type="button" id="import" title="Import options">
						<span class="mw-icon mw-icon-upload" aria-hidden="true"></span>
					</button>
					<button type="button" id="export" title="Export options">
						<span class="mw-icon mw-icon-download" aria-hidden="true"></span>
					</button>
				</div>
			</div>

			<div class="panel">
				<button type="button" id="toggle-enabled">Disabled</button>
			</div>

			<div class="panel import-area">
				<form id="import-form">
					<input type="file" id="import-file" accept="application/json"/>
				</form>
			</div>

			<div class="panel">
				<form id="form-general">
					<label for="searches">Search URLs</label>
					<textarea class="text-input" id="searches" placeholder="https://www.google.com/search?q=
https://duckduckgo.com/?q="></textarea>
					<p class="field-hint">
						Add one search URL prefix per line, ending where the query should be inserted.
						Example: <code>https://www.google.com/search?q=</code>. In popup, pick any search URL and the query is appended automatically.
					</p>

					<button type="button" class="save" id="general-save">Save</button>
				</form>
			</div>

			<div class="panel">
				<form id="pages" class="dynamic" data-key="pages">
					<h2>Pages</h2>
					<div class="items"></div>
					<div class="item template">
						<input class="position" type="number" name="position" min="0" step="1" value="0"/>
						<input class="name" type="text" name="name" placeholder="Name" value=""/>
						<input class="url" type="text" name="url" placeholder="Url" value=""/>
						<input class="regexp" type="text" name="regexp" placeholder="RegExp" value=""/>
						<button type="button" class="page-settings">Settings</button>
						<button type="button" class="red remove">Remove Page</button>
					</div>
					<button type="button" class="add">Add Page</button>
				</form>
			</div>

			<div class="panel" id="page-settings-panel">
				<form id="page-settings">
					<h2>Page Settings</h2>

					<div class="controls">
						<button type="button" id="page-settings-close-nosave" title="Close page settings without saving">
							<span class="mw-icon mw-icon-x" aria-hidden="true"></span>
						</button>
					</div>

					<input type="hidden" name="id" id="page-id" value=""/>
					<label for="page-css">CSS</label>
					<textarea name="page-css" id="page-css"></textarea>
					<label for="page-js">JS</label>
					<textarea name="page-js" id="page-js"></textarea>
					<button type="submit">Save</button>
					<button type="submit" id="page-settings-close">Save & Close</button>
				</form>
			</div>
		</div>

		<div id="modal">
			<div class="modal-content">
				<p>Lorem ipsum dotsum pop itok...</p>
			</div>
		</div>

		<script src="../lib/codemirror.js"></script>
		<script src="../lib/codemirror/mode/css/css.js"></script>
		<script src="../lib/codemirror/mode/javascript/javascript.js"></script>
		<script src="../service/runtime.js"></script>
		<script src="../service/config.js"></script>
		<script src="../utils.js"></script>
		<script src="default.js"></script>
	</body>
</html>
