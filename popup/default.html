<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="default.css"/>
	</head>

	<body>
		<div id="browser-popup">
			<div class="navigation">
				<img class="logo" src="logo.png" alt="Logo" />
				<h1>ModWe</h1>

				<button type="button" id="options" title="Open options">
					<span class="mw-icon mw-icon-settings" aria-hidden="true"></span>
				</button>
			</div>

			<div class="content">
				<button type="button" id="toggle-enabled">Disabled</button>

				<div class="popup-panel">
					<h2>Navigate</h2>
					<select name="navigate" id="navigate">
						<option value="">Navigate to...</option>
					</select>

					<div class="input-checkbox">
						<label for="navigate-new">New tab</label>
						<input type="checkbox" name="navigate-new" id="navigate-new" value="1"/>
					</div>
				</div>

				<div class="popup-panel">
					<h2>Search</h2>
					<form id="search-form">
						<select name="search-source" id="search-source">
							<option value="">Search with...</option>
						</select>

						<div class="input-button">
							<input class="text-input" id="query" type="text" value="" placeholder="Type or Paste text to search"/>

							<button type="submit" class="search-button" id="search">
								<span class="mw-icon mw-icon-search" aria-hidden="true"></span>
							</button>
						</div>
					</form>

					<div class="input-checkbox">
						<label for="search-new">New tab</label>
						<input type="checkbox" name="search-new" id="search-new" value="1"/>
					</div>
				</div>

				<div class="popup-panel">
					<h2>Open URLs</h2>
					<textarea id="open-urls" placeholder="Paste (only) urls to open in tabs"></textarea>
				</div>

				<div id="message"></div>
			</div>
		</div>

		<script src="../service/runtime.js"></script>
		<script src="../service/config.js"></script>
		<script src="../service/tabs.js"></script>
		<script src="default.js"></script>
	</body>
</html>
